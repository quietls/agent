<VirtualHost *:80>
    ServerName nother.one
    DocumentRoot /var/www/html
</VirtualHost>

<VirtualHost *:443>
    ServerName nother.one
    DocumentRoot /var/www/html
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/nother.one.crt
    SSLCertificateKeyFile /etc/apache2/ssl/nother.one.key
</VirtualHost>

<VirtualHost *:80>
    ServerName test.local
    DocumentRoot /var/www/html
</VirtualHost>
