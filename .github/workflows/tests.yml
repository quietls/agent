name: Tests

# Standalone-repo test workflow. Activates once apps/agent is extracted into its
# own repository (where this file lives at .github/workflows/ and go.mod is at
# the repo root). It does not run inside the monorepo.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-tests:
    name: Agent tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...
