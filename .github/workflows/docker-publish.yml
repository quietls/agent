name: Publish Docker image

# Builds a multi-arch image and pushes it to Docker Hub on version tags.
#
# NOTE: This workflow is designed for the standalone open-source repo where this
# file sits at .github/workflows/ and the Dockerfile is at the repo root. Inside
# the monorepo (apps/agent/.github/...) GitHub does not run it — it activates
# automatically once apps/agent is extracted into its own repository.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  — Docker Hub account/org with push access to quietls/agent
#   DOCKERHUB_TOKEN     — Docker Hub access token (Account Settings → Security)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quietls/agent
          # latest=auto (default flavor) also tags the highest semver as `latest`
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
