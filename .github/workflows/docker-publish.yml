name: Publish Docker image

# Publishes a multi-arch image to Docker Hub for a MANUALLY pushed version tag.
#
# Patch releases are automatic — see release.yml, which fires on every push to
# main. Use this workflow for bigger bumps: push a tag yourself, e.g.
#   git tag v0.2.0 && git push origin v0.2.0
# and the next main push auto-bumps the patch from there (v0.2.0 -> v0.2.1).
#
# (A tag created by release.yml's GITHUB_TOKEN does NOT trigger this workflow,
# so there is no double build — this only runs for human/PAT tag pushes.)
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  — Docker Hub account/org with push access to quietls/agent
#   DOCKERHUB_TOKEN     — Docker Hub access token (Account Settings → Security)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quietls/agent
          # latest=auto (default flavor) also tags the highest semver as `latest`
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
